services:
  csv-generator:
    build: .
    volumes:
      # Map your local results_aggregated directory to /data inside the container
      - ./sample_data:/data
      # Map your local output directory
      - ./output:/output
    environment:
      - GPCR_DATA_DIR=/data
      - GPCR_OUTPUT_DIR=/output
    # Required for interactive Rich prompts
    stdin_open: true
    tty: true
