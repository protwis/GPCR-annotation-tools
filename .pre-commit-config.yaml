repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests>=2.31
          - types-tqdm>=4.60
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy src/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast unit tests)
        entry: python -m pytest tests/unit/ -x -q --tb=line
        language: system
        pass_filenames: false
        stages: [pre-commit]
