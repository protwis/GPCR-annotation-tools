repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests>=2.31
          - types-tqdm>=4.60
          - rich>=13.0
          - google-genai>=1.0
          - requests>=2.31
          - tqdm>=4.60
          - lxml>=5.0
          - PyMuPDF>=1.24
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy src/
